<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Browser Benchmarks</title>
  <style>
    :root{
      --bg: #0b1220;
      --panel: #111a2e;
      --text: #e8eefc;
      --outline: rgba(255,255,255,.14);
      --shadow: 0 10px 30px rgba(0,0,0,.35);

      /* Touch-friendly sizing */
      --tapMin: 76px;      /* big tap targets */
      --radius: 18px;
      --gap: 16px;
      --maxw: 920px;
    }

    @media (prefers-color-scheme: light){
      :root{
        --bg:#f4f7ff;
        --panel:#ffffff;
        --text:#0f172a;
        --outline: rgba(15,23,42,.12);
        --shadow: 0 10px 30px rgba(2,6,23,.10);
      }
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      touch-action: manipulation;
    }

    .wrap{
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 24px 18px 28px;
    }

    h1{
      margin: 0 0 18px 0;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.1;
      letter-spacing: .2px;
      text-align: center;
    }

    .grid{
      display:grid;
      grid-template-columns: 1fr;
      gap: var(--gap);
    }

    @media (min-width: 720px){
      .grid{ grid-template-columns: 1fr 1fr; }
    }

    a.btn{
      display:flex;
      align-items:center;
      justify-content:center;
      min-height: var(--tapMin);
      padding: 18px 18px;
      border-radius: var(--radius);
      border: 1px solid var(--outline);
      background: var(--panel);
      box-shadow: var(--shadow);
      color: var(--text);
      text-decoration:none;
      font-weight: 800;
      font-size: clamp(18px, 2.4vw, 22px);
      letter-spacing: .2px;
      -webkit-tap-highlight-color: transparent;
      user-select:none;
      -webkit-user-select:none;
    }

    a.btn:active{
      transform: scale(0.99);
    }

    a.btn:focus-visible{
      outline: none;
      box-shadow: 0 0 0 4px rgba(78,161,255,.35), var(--shadow);
    }
  </style>
</head>

<body>
  <main class="wrap">
    <h1>Browser Benchmarks</h1>

    <section class="grid" aria-label="Browser benchmark links">
      <a class="btn" href="https://browserbench.org/Speedometer3.1">Speedometer 3.1</a>
      <a class="btn" href="https://browserbench.org/JetStream">JetStream</a>
      <a class="btn" href="https://browserbench.org/MotionMark1.3.1">MotionMark 1.3.1</a>
      <a class="btn" href="https://web.basemark.com/">Basemark Web</a>
      <a class="btn" href="https://www.principledtechnologies.com/wx5/">WebXPRT 5</a>
    </section>
  </main>
</body>
</html>
